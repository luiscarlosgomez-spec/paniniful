<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a0b2e">
    <title>Sticker Gol 2026 - Álbum Virtual</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif']
                    },
                    colors: {
                        fifa: {
                            dark: '#0a0514',
                            card: '#160a2b',
                            purple: '#8b5cf6',
                            magenta: '#ec4899',
                            cyan: '#06b6d4',
                            green: '#10b981',
                            text: '#f8fafc',
                            gold: '#fbbf24'
                        }
                    },
                    backgroundImage: {
                        'gradient-2026': 'linear-gradient(135deg, #8b5cf6 0%, #ec4899 50%, #06b6d4 100%)',
                        'gradient-card': 'linear-gradient(180deg, rgba(22,10,43,1) 0%, rgba(10,5,20,1) 100%)',
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #0a0514; 
            color: #f8fafc; 
            -webkit-tap-highlight-color: transparent; 
            overflow-x: hidden;
        }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0a0514; }
        ::-webkit-scrollbar-thumb { background: #3b1c6e; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #8b5cf6; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .sticker-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); user-select: none; }
        .sticker-btn:active { transform: scale(0.92); }
        
        .sticker-missing { background: #1e0e3c; color: #64748b; border: 1px solid #3b1c6e; box-shadow: inset 0 2px 4px rgba(0,0,0,0.3); }
        .sticker-got { background: linear-gradient(135deg, #8b5cf6 0%, #06b6d4 100%); color: white; border-color: transparent; box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3); font-weight: 900; }
        .sticker-got.fwc-card { background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); color: #451a03; box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3); }

        .sticker-rep { position: absolute; top: -6px; right: -6px; background: #ec4899; color: white; font-weight: 900; font-size: 0.75rem; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #0a0514; box-shadow: 0 2px 5px rgba(0,0,0,0.5); z-index: 10; }

        .glass-nav { background: rgba(10, 5, 20, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-top: 1px solid rgba(139, 92, 246, 0.2); }
        .tab-content { display: none; padding-bottom: 100px; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .progress-bar-fill { transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .nav-btn.active { color: #06b6d4; }
        .nav-btn.active i { text-shadow: 0 0 15px rgba(6, 182, 212, 0.6); transform: translateY(-2px); transition: all 0.3s ease; }

        #splash { position: fixed; inset: 0; background: #0a0514; z-index: 50; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease, visibility 0.5s ease; }
        .loader-ring { width: 60px; height: 60px; border: 4px solid rgba(139, 92, 246, 0.1); border-left-color: #06b6d4; border-right-color: #ec4899; border-radius: 50%; animation: spin 1.2s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .modal-overlay { background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); animation: fadeIn 0.2s ease; }
    </style>
</head>
<body class="bg-fifa-dark text-fifa-text antialiased">

    <div id="splash">
        <div class="relative mb-6">
            <h1 class="text-7xl font-black bg-clip-text text-transparent bg-gradient-2026 tracking-tighter">2026</h1>
            <div class="absolute -bottom-2 -right-2 text-2xl">🏆</div>
        </div>
        <p class="text-2xl font-bold tracking-[0.3em] text-white mb-12 uppercase">Sticker Gol</p>
        <div class="loader-ring mb-6"></div>
        <p class="text-sm text-fifa-cyan font-medium animate-pulse" id="splash-text">Preparando tu colección...</p>
    </div>

    <header class="fixed top-0 w-full z-40 bg-fifa-dark/90 backdrop-blur-md border-b border-white/10 pt-safe">
        <div class="px-4 py-3">
            <div class="flex justify-between items-center mb-3">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-full bg-gradient-2026 flex items-center justify-center shadow-lg shadow-purple-500/20">
                        <i class="fa-solid fa-futbol text-white text-sm"></i>
                    </div>
                    <h1 class="text-lg font-black tracking-wide text-white">STICKER<span class="text-fifa-cyan">GOL</span></h1>
                </div>
                <div class="flex items-center gap-2 bg-white/5 px-3 py-1 rounded-full border border-white/10">
                    <i class="fa-solid fa-trophy text-fifa-gold text-xs"></i>
                    <span class="text-sm font-black text-white" id="global-perc">0%</span>
                </div>
            </div>
            <div class="w-full bg-gray-800 rounded-full h-2.5 overflow-hidden border border-white/5">
                <div class="bg-gradient-2026 h-full rounded-full progress-bar-fill relative" id="global-progress" style="width: 0%">
                    <div class="absolute top-0 right-0 bottom-0 left-0 bg-white/20 w-full animate-[pulse_2s_ease-in-out_infinite]"></div>
                </div>
            </div>
        </div>
    </header>

    <main class="pt-[90px] px-4 max-w-3xl mx-auto pb-[90px] pb-safe">
        
        <div id="tab-album" class="tab-content active">
            <div class="sticky top-[80px] z-30 bg-fifa-dark/95 backdrop-blur py-3 -mx-4 px-4 mb-4 border-b border-white/5">
                <div class="flex gap-2 overflow-x-auto no-scrollbar">
                    <button onclick="filterTeams('all')" id="btn-filt-all" class="px-5 py-2 rounded-full bg-gradient-2026 text-white text-sm font-bold whitespace-nowrap shadow-lg shadow-purple-500/20 transition">Todos</button>
                    <button onclick="filterTeams('incomplete')" id="btn-filt-inc" class="px-5 py-2 rounded-full bg-white/5 text-gray-300 text-sm font-medium whitespace-nowrap border border-white/10 hover:bg-white/10 transition">Incompletos</button>
                    <button onclick="filterTeams('complete')" id="btn-filt-com" class="px-5 py-2 rounded-full bg-white/5 text-gray-300 text-sm font-medium whitespace-nowrap border border-white/10 hover:bg-white/10 transition">Completados</button>
                </div>
            </div>

            <div id="teams-container" class="space-y-4"></div>
        </div>

        <div id="tab-missing" class="tab-content pt-4">
            <div class="flex items-center gap-3 mb-6">
                <div class="w-10 h-10 rounded-xl bg-fifa-magenta/20 flex items-center justify-center text-fifa-magenta">
                    <i class="fa-solid fa-magnifying-glass text-xl"></i>
                </div>
                <div>
                    <h2 class="text-2xl font-black text-white leading-none">Mis Faltantes</h2>
                    <p class="text-sm text-gray-400 mt-1">Láminas que necesitas</p>
                </div>
            </div>

            <div class="bg-fifa-card rounded-2xl p-5 border border-white/5 shadow-xl relative overflow-hidden">
                <button onclick="copyToClipboard('missing-list', this)" class="w-full mb-4 py-3 bg-gradient-to-r from-white/10 to-white/5 hover:from-white/15 hover:to-white/10 border border-white/10 rounded-xl text-sm font-bold text-white transition flex items-center justify-center gap-2 shadow-lg relative z-10">
                    <i class="fa-regular fa-copy"></i> Copiar para compartir
                </button>
                <div class="relative z-10">
                    <div id="missing-list" class="text-sm text-gray-300 leading-relaxed whitespace-pre-wrap font-mono bg-black/40 p-4 rounded-xl border border-white/5 h-[60vh] overflow-y-auto custom-scrollbar"></div>
                </div>
            </div>
        </div>

        <div id="tab-repeats" class="tab-content pt-4">
            <div class="flex items-center gap-3 mb-6">
                <div class="w-10 h-10 rounded-xl bg-fifa-cyan/20 flex items-center justify-center text-fifa-cyan">
                    <i class="fa-solid fa-right-left text-xl"></i>
                </div>
                <div>
                    <h2 class="text-2xl font-black text-white leading-none">Mis Repetidas</h2>
                    <p class="text-sm text-gray-400 mt-1">Disponibles para cambio</p>
                </div>
            </div>

            <div class="bg-fifa-card rounded-2xl p-5 border border-white/5 shadow-xl relative overflow-hidden">
                <button onclick="copyToClipboard('repeats-list', this)" class="w-full mb-4 py-3 bg-gradient-to-r from-white/10 to-white/5 hover:from-white/15 hover:to-white/10 border border-white/10 rounded-xl text-sm font-bold text-white transition flex items-center justify-center gap-2 shadow-lg relative z-10">
                    <i class="fa-regular fa-copy"></i> Copiar para compartir
                </button>
                <div class="relative z-10">
                    <div id="repeats-list" class="text-sm text-fifa-cyan leading-relaxed whitespace-pre-wrap font-mono bg-black/40 p-4 rounded-xl border border-white/5 h-[60vh] overflow-y-auto custom-scrollbar"></div>
                </div>
            </div>
        </div>

        <div id="tab-stats" class="tab-content pt-4">
            <h2 class="text-2xl font-black text-white mb-6">Resumen General</h2>
            
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-fifa-card p-5 rounded-2xl border border-white/5 relative overflow-hidden group">
                    <div class="text-4xl font-black text-white mb-1 relative z-10" id="stat-got">0</div>
                    <div class="text-xs text-gray-400 uppercase tracking-widest font-bold relative z-10">Pegadas</div>
                </div>
                
                <div class="bg-fifa-card p-5 rounded-2xl border border-white/5 relative overflow-hidden group">
                    <div class="text-4xl font-black text-fifa-magenta mb-1 relative z-10" id="stat-missing">0</div>
                    <div class="text-xs text-gray-400 uppercase tracking-widest font-bold relative z-10">Faltantes</div>
                </div>
                
                <div class="bg-fifa-card p-5 rounded-2xl border border-white/5 relative overflow-hidden group">
                    <div class="text-4xl font-black text-fifa-cyan mb-1 relative z-10" id="stat-repeats">0</div>
                    <div class="text-xs text-gray-400 uppercase tracking-widest font-bold relative z-10">Repetidas</div>
                </div>
                
                <div class="bg-gradient-2026 p-[1px] rounded-2xl">
                    <div class="bg-fifa-card w-full h-full p-5 rounded-[15px] relative overflow-hidden">
                        <div class="text-4xl font-black text-transparent bg-clip-text bg-gradient-2026 mb-1 relative z-10" id="stat-total">980</div>
                        <div class="text-xs text-gray-400 uppercase tracking-widest font-bold relative z-10">Total Álbum</div>
                    </div>
                </div>
            </div>

            <h2 class="text-xl font-black text-white mb-4">Gestión de Datos</h2>
            <div class="space-y-3">
                <button onclick="exportData()" class="w-full p-4 bg-fifa-card border border-white/5 rounded-xl text-left flex justify-between items-center hover:bg-white/5 transition shadow-sm group">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center group-hover:bg-fifa-purple/20 group-hover:text-fifa-purple transition">
                            <i class="fa-solid fa-download"></i>
                        </div>
                        <div>
                            <span class="block font-bold text-sm">Exportar Colección</span>
                            <span class="block text-xs text-gray-500 mt-0.5">Guardar respaldo (JSON)</span>
                        </div>
                    </div>
                    <i class="fa-solid fa-chevron-right text-gray-600"></i>
                </button>
                
                <label class="w-full p-4 bg-fifa-card border border-white/5 rounded-xl text-left flex justify-between items-center hover:bg-white/5 transition shadow-sm cursor-pointer group">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center group-hover:bg-fifa-cyan/20 group-hover:text-fifa-cyan transition">
                            <i class="fa-solid fa-upload"></i>
                        </div>
                        <div>
                            <span class="block font-bold text-sm">Importar Respaldo</span>
                            <span class="block text-xs text-gray-500 mt-0.5">Cargar archivo JSON</span>
                        </div>
                    </div>
                    <input type="file" id="import-file" class="hidden" accept=".json" onchange="importData(event)">
                    <i class="fa-solid fa-chevron-right text-gray-600"></i>
                </label>
                
                <button onclick="confirmClearData()" class="w-full p-4 bg-red-950/30 border border-red-500/20 text-red-400 rounded-xl text-left flex justify-between items-center hover:bg-red-900/40 transition mt-6 group">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-red-500/10 flex items-center justify-center group-hover:bg-red-500/20 transition">
                            <i class="fa-solid fa-trash"></i>
                        </div>
                        <span class="font-bold text-sm">Reiniciar Álbum Completo</span>
                    </div>
                    <i class="fa-solid fa-triangle-exclamation"></i>
                </button>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full glass-nav pb-safe z-40">
        <div class="flex justify-around items-center h-[70px] max-w-md mx-auto px-2 relative">
            <button onclick="switchTab('album')" id="nav-album" class="nav-btn active flex flex-col items-center justify-center w-16 h-full text-gray-500 hover:text-white transition">
                <i class="fa-solid fa-book-open text-xl mb-1.5"></i>
                <span class="text-[10px] font-bold tracking-wide uppercase">Álbum</span>
            </button>
            <button onclick="switchTab('missing')" id="nav-missing" class="nav-btn flex flex-col items-center justify-center w-16 h-full text-gray-500 hover:text-white transition">
                <i class="fa-solid fa-magnifying-glass text-xl mb-1.5"></i>
                <span class="text-[10px] font-bold tracking-wide uppercase">Faltan</span>
            </button>
            <button onclick="switchTab('repeats')" id="nav-repeats" class="nav-btn flex flex-col items-center justify-center w-16 h-full text-gray-500 hover:text-white transition relative">
                <i class="fa-solid fa-right-left text-xl mb-1.5"></i>
                <span class="text-[10px] font-bold tracking-wide uppercase">Repes</span>
                <span id="badge-repeats" class="absolute top-1.5 right-1 bg-fifa-magenta text-white text-[9px] font-black px-1.5 py-0.5 rounded-full shadow-lg shadow-pink-500/50 hidden border-2 border-[#0a0514]">0</span>
            </button>
            <button onclick="switchTab('stats')" id="nav-stats" class="nav-btn flex flex-col items-center justify-center w-16 h-full text-gray-500 hover:text-white transition">
                <i class="fa-solid fa-chart-pie text-xl mb-1.5"></i>
                <span class="text-[10px] font-bold tracking-wide uppercase">Stats</span>
            </button>
        </div>
    </nav>

    <div id="custom-modal" class="fixed inset-0 z-50 modal-overlay hidden flex items-center justify-center p-4">
        <div class="bg-fifa-card border border-white/10 rounded-2xl w-full max-w-sm p-6 shadow-2xl transform scale-95 opacity-0 transition-all duration-200" id="modal-content">
            <div class="text-center mb-6" id="modal-icon">
                <i class="fa-solid fa-circle-exclamation text-4xl text-fifa-cyan"></i>
            </div>
            <h3 class="text-xl font-black text-white text-center mb-2" id="modal-title">Título</h3>
            <p class="text-gray-400 text-sm text-center mb-6" id="modal-body">Mensaje</p>
            <div class="flex gap-3" id="modal-actions"></div>
        </div>
    </div>

    <script>
        const TEAMS = [
            { code: 'FWC', name: 'FIFA World Cup™', count: 20 },
            { code: 'USA', name: 'Estados Unidos', count: 20 },
            { code: 'MEX', name: 'México', count: 20 },
            { code: 'CAN', name: 'Canadá', count: 20 },
            { code: 'ARG', name: 'Argentina', count: 20 },
            { code: 'BRA', name: 'Brasil', count: 20 },
            { code: 'COL', name: 'Colombia', count: 20 },
            { code: 'URU', name: 'Uruguay', count: 20 },
            { code: 'ECU', name: 'Ecuador', count: 20 },
            { code: 'VEN', name: 'Venezuela', count: 20 },
            { code: 'PER', name: 'Perú', count: 20 },
            { code: 'CHI', name: 'Chile', count: 20 },
            { code: 'PAR', name: 'Paraguay', count: 20 },
            { code: 'BOL', name: 'Bolivia', count: 20 },
            { code: 'FRA', name: 'Francia', count: 20 },
            { code: 'ENG', name: 'Inglaterra', count: 20 },
            { code: 'ESP', name: 'España', count: 20 },
            { code: 'GER', name: 'Alemania', count: 20 },
            { code: 'POR', name: 'Portugal', count: 20 },
            { code: 'ITA', name: 'Italia', count: 20 },
            { code: 'NED', name: 'Países Bajos', count: 20 },
            { code: 'CRO', name: 'Croacia
