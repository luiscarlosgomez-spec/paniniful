<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a0b2e">
    <title>Sticker Gol 2026 - Álbum Virtual</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif']
                    },
                    colors: {
                        fifa: {
                            dark: '#0a0514',      /* Deep dark background */
                            card: '#160a2b',      /* Card background */
                            purple: '#8b5cf6',    /* Bright Purple */
                            magenta: '#ec4899',   /* Magenta */
                            cyan: '#06b6d4',      /* Cyan for 2026 branding */
                            green: '#10b981',     /* Success green */
                            text: '#f8fafc',
                            gold: '#fbbf24'       /* FWC Special gold */
                        }
                    },
                    backgroundImage: {
                        'gradient-2026': 'linear-gradient(135deg, #8b5cf6 0%, #ec4899 50%, #06b6d4 100%)',
                        'gradient-card': 'linear-gradient(180deg, rgba(22,10,43,1) 0%, rgba(10,5,20,1) 100%)',
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #0a0514; 
            color: #f8fafc; 
            -webkit-tap-highlight-color: transparent; 
            overflow-x: hidden;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0a0514; }
        ::-webkit-scrollbar-thumb { background: #3b1c6e; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #8b5cf6; }

        /* Hiding scrollbar for tabs */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Sticker Buttons */
        .sticker-btn { 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            user-select: none;
        }
        .sticker-btn:active { transform: scale(0.92); }
        
        .sticker-missing { 
            background: #1e0e3c; 
            color: #64748b; 
            border: 1px solid #3b1c6e; 
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }
        .sticker-got { 
            background: linear-gradient(135deg, #8b5cf6 0%, #06b6d4 100%); 
            color: white; 
            border-color: transparent; 
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3); 
            font-weight: 900;
        }
        /* Special styles for FWC (Gold) */
        .sticker-got.fwc-card {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            color: #451a03;
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
        }

        .sticker-rep { 
            position: absolute; 
            top: -6px; 
            right: -6px; 
            background: #ec4899; 
            color: white; 
            font-weight: 900; 
            font-size: 0.75rem; 
            width: 22px; 
            height: 22px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            border: 2px solid #0a0514;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* Layout & Navigation */
        .glass-nav { 
            background: rgba(10, 5, 20, 0.85); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(139, 92, 246, 0.2); 
        }
        .tab-content { display: none; padding-bottom: 100px; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        .progress-bar-fill { transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .nav-btn.active { color: #06b6d4; }
        .nav-btn.active i { 
            text-shadow: 0 0 15px rgba(6, 182, 212, 0.6); 
            transform: translateY(-2px);
            transition: all 0.3s ease;
        }

        /* Splash Screen */
        #splash { 
            position: fixed; 
            inset: 0; 
            background: #0a0514; 
            z-index: 50; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            transition: opacity 0.5s ease, visibility 0.5s ease; 
        }
        .loader-ring {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(139, 92, 246, 0.1);
            border-left-color: #06b6d4;
            border-right-color: #ec4899;
            border-radius: 50%;
            animation: spin 1.2s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        /* Modals */
        .modal-overlay {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            animation: fadeIn 0.2s ease;
        }
    </style>
</head>

    <script>
        // --- 1. CONFIGURACIÓN Y DATOS ---
        const TEAMS = [
            // Sección Historia/Especiales
            { code: 'FWC', name: 'FIFA World Cup™', count: 20 },
            // Sedes Norteamérica
            { code: 'USA', name: 'Estados Unidos', count: 20 },
            { code: 'MEX', name: 'México', count: 20 },
            { code: 'CAN', name: 'Canadá', count: 20 },
            // Conmebol
            { code: 'ARG', name: 'Argentina', count: 20 },
            { code: 'BRA', name: 'Brasil', count: 20 },
            { code: 'COL', name: 'Colombia', count: 20 },
            { code: 'URU', name: 'Uruguay', count: 20 },
            { code: 'ECU', name: 'Ecuador', count: 20 },
            { code: 'VEN', name: 'Venezuela', count: 20 },
            { code: 'PER', name: 'Perú', count: 20 },
            { code: 'CHI', name: 'Chile', count: 20 },
            { code: 'PAR', name: 'Paraguay', count: 20 },
            { code: 'BOL', name: 'Bolivia', count: 20 },
            // UEFA
            { code: 'FRA', name: 'Francia', count: 20 },
            { code: 'ENG', name: 'Inglaterra', count: 20 },
            { code: 'ESP', name: 'España', count: 20 },
            { code: 'GER', name: 'Alemania', count: 20 },
            { code: 'POR', name: 'Portugal', count: 20 },
            { code: 'ITA', name: 'Italia', count: 20 },
            { code: 'NED', name: 'Países Bajos', count: 20 },
            { code: 'CRO', name: 'Croacia', count: 20 },
            { code: 'BEL', name: 'Bélgica', count: 20 },
            { code: 'SUI', name: 'Suiza', count: 20 },
            { code: 'DEN', name: 'Dinamarca', count: 20 },
            { code: 'SWE', name: 'Suecia', count: 20 },
            { code: 'POL', name: 'Polonia', count: 20 },
            // CAF
            { code: 'MAR', name: 'Marruecos', count: 20 },
            { code: 'SEN', name: 'Senegal', count: 20 },
            { code: 'EGY', name: 'Egipto', count: 20 },
            { code: 'ALG', name: 'Argelia', count: 20 },
            { code: 'CMR', name: 'Camerún', count: 20 },
            { code: 'NGA', name: 'Nigeria', count: 20 },
            { code: 'CIV', name: 'Costa de Marfil', count: 20 },
            { code: 'GHA', name: 'Ghana', count: 20 },
            // AFC
            { code: 'JPN', name: 'Japón', count: 20 },
            { code: 'KOR', name: 'Corea del Sur', count: 20 },
            { code: 'KSA', name: 'Arabia Saudita', count: 20 },
            { code: 'IRN', name: 'Irán', count: 20 },
            { code: 'AUS', name: 'Australia', count: 20 },
            { code: 'QAT', name: 'Qatar', count: 20 },
            { code: 'IRQ', name: 'Irak', count: 20 },
            { code: 'UAE', name: 'Emiratos Árabes', count: 20 },
            { code: 'UZB', name: 'Uzbekistán', count: 20 },
            // OFC y CONCACAF restantes
            { code: 'NZL', name: 'Nueva Zelanda', count: 20 },
            { code: 'CRC', name: 'Costa Rica', count: 20 },
            { code: 'PAN', name: 'Panamá', count: 20 },
            { code: 'JAM', name: 'Jamaica', count: 20 },
            { code: 'HON', name: 'Honduras', count: 20 }
        ];

        let collection = {}; 
        let db;
        let currentFilter = 'all';

        // --- 2. INDEXEDDB REPARADO Y OPTIMIZADO ---
        const initDB = () => {
            return new Promise((resolve, reject) => {
                // Versión 2 por seguridad si existía base previa dañada
                const request = indexedDB.open('StickerGol26DB', 2);
                
                request.onupgradeneeded = (e) => {
                    const database = e.target.result;
                    // Corrección Crítica: Se definen los keyPath explícitamente en la creación
                    if (!database.objectStoreNames.contains('stickers')) {
                        database.createObjectStore('stickers', { keyPath: 'id' });
                    }
                    if (!database.objectStoreNames.contains('cfg')) {
                        database.createObjectStore('cfg', { keyPath: 'k' });
                    }
                };

                request.onsuccess = (e) => {
                    db = e.target.result;
                    resolve();
                };

                request.onerror = (e) => {
                    console.error("IndexedDB Error:", e.target.error);
                    reject(e.target.error);
                };
            });
        };

        const getAllStickers = () => {
            return new Promise((resolve, reject) => {
                const tx = db.transaction('stickers', 'readonly');
                const store = tx.objectStore('stickers');
                const request = store.getAll();
                
                request.onsuccess = () => {
                    const data = {};
                    request.result.forEach(item => data[item.id] = item);
                    resolve(data);
                };
                request.onerror = () => reject(request.error);
            });
        };

        const saveSticker = (id, data) => {
            try {
                const tx = db.transaction('stickers', 'readwrite');
                const store = tx.objectStore('stickers');
                store.put({ id, ...data });
            } catch (e) {
                console.error("Error guardando lámina:", e);
                // Fallback a localStorage si falla IndexedDB momentáneamente
                localStorage.setItem(`sg26_backup_${id}`, JSON.stringify(data));
            }
        };

        const clearAllStickersDB = () => {
            return new Promise((resolve) => {
                const tx = db.transaction('stickers', 'readwrite');
                const store = tx.objectStore('stickers');
                store.clear();
                tx.oncomplete = () => resolve();
            });
        };

        // --- 3. LÓGICA PRINCIPAL DE LA APP ---
        async function boot() {
            try {
                document.getElementById('splash-text').innerText = "Iniciando base de datos...";
                await initDB();
                
                document.getElementById('splash-text').innerText = "Cargando colección...";
                collection = await getAllStickers();
                
                // Restaurar de localStorage si hubo fallos previos
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key.startsWith('sg26_backup_')) {
                        const id = key.replace('sg26_backup_', '');
                        const data = JSON.parse(localStorage.getItem(key));
                        collection[id] = data;
                        saveSticker(id, data); // Mover de local a Indexed
                        localStorage.removeItem(key);
                    }
                }

                document.getElementById('splash-text').innerText = "Renderizando álbum...";
                renderAlbum();
                updateStats();
                
                // Transición suave de salida del Splash
                setTimeout(() => {
                    const splash = document.getElementById('splash');
                    splash.style.opacity = '0';
                    splash.style.visibility = 'hidden';
                    setTimeout(() => splash.style.display = 'none', 500);
                }, 800);
            } catch (e) {
                console.error("Boot failed:", e);
                showModal("Error Grave", "No se pudo iniciar la base de datos local. Tu navegador podría estar en modo incógnito estricto o sin espacio.", "error");
                // Esconder splash de todos modos para no bloquear al usuario
                document.getElementById('splash').style.display = 'none';
            }
        }

        // --- 4. RENDERIZADO DEL ÁLBUM ---
        function renderAlbum() {
            const container = document.getElementById('teams-container');
            // Usamos un DocumentFragment para mejor rendimiento (menos reflows del DOM)
            const fragment = document.createDocumentFragment();

            TEAMS.forEach(team => {
                let teamGot = 0;
                for(let i=1; i<=team.count; i++) {
                    const id = `${team.code}-${i}`;
                    if(collection[id] && collection[id].got) teamGot++;
                }

                const isComplete = teamGot === team.count;
                const status = isComplete ? 'complete' : (teamGot === 0 ? 'empty' : 'incomplete');
                
                const el = document.createElement('div');
                el.className = `bg-fifa-card rounded-2xl border ${isComplete ? 'border-fifa-green/40 shadow-[0_0_15px_rgba(16,185,129,0.1)]' : 'border-white/5'} overflow-hidden transition-all duration-300 team-card`;
                el.dataset.status = status;
                el.id = `card-${team.code}`;
                
                // Diseño de la cabecera
                const headerBg = team.code === 'FWC' ? 'bg-gradient-to-r from-[#2c1605] to-[#160a2b]' : 'bg-gradient-card';
                const badgeColor = isComplete ? 'bg-fifa-green text-[#0a0514]' : 'bg-white/10 text-white border border-white/20';

                el.innerHTML = `
                    <div class="p-4 ${headerBg} flex justify-between items-center cursor-pointer select-none" onclick="toggleTeam('${team.code}')">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full ${badgeColor} flex items-center justify-center font-black text-xs shadow-inner transition-colors duration-300" id="badge-${team.code}">
                                ${team.code}
                            </div>
                            <div>
                                <h3 class="font-bold text-lg leading-tight text-white">${team.name}</h3>
                                <p class="text-xs text-gray-500 font-medium" id="desc-${team.code}">${isComplete ? '¡Completado!' : (teamGot === 0 ? 'Sin iniciar' : 'En progreso')}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-sm font-black ${isComplete ? 'text-fifa-green' : 'text-gray-400'} transition-colors duration-300" id="counter-${team.code}">${teamGot}/${team.count}</span>
                            <div class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center">
                                <i class="fa-solid fa-chevron-down text-gray-400 transition-transform duration-300" id="icon-${team.code}"></i>
                            </div>
                        </div>
                    </div>
                    <div class="hidden p-4 bg-black/40 border-t border-white/5" id="grid-${team.code}">
                        <!-- Stickers generados dinámicamente al abrir -->
                    </div>
                `;
                fragment.appendChild(el);
            });
            
            container.appendChild(fragment);
            applyFilter(); // Aplica el filtro actual
        }

        // Carga diferida de los botones de láminas para no saturar el DOM al inicio
        function renderStickersGrid(teamCode) {
            const team = TEAMS.find(t => t.code === teamCode);
            const isFWC = team.code === 'FWC';
            
            let html = `<div class="grid grid-cols-5 sm:grid-cols-7 md:grid-cols-10 gap-2 sm:gap-3">`;
            
            for(let i=1; i<=team.count; i++) {
                const id = `${team.code}-${i}`;
                const st = collection[id] || { got: false, rep: 0 };
                
                let btnClass = 'sticker-missing';
                if(st.got) {
                    btnClass = isFWC ? 'sticker-got fwc-card' : 'sticker-got';
                }
                
                const repBadge = st.rep > 0 ? `<div class="sticker-rep" onclick="event.stopPropagation(); changeRep('${id}', -1)">${st.rep}</div>` : '';
                
                html += `
                <button class="relative aspect-[3/4] rounded-lg font-bold text-sm flex flex-col items-center justify-center sticker-btn ${btnClass}" 
                    id="btn-${id}"
                    onclick="toggleSticker('${id}')" 
                    oncontextmenu="event.preventDefault(); changeRep('${id}', 1)">
                    <span class="opacity-60 text-[9px] mb-1 leading-none tracking-wider">${team.code}</span>
                    <span class="text-base">${i}</span>
                    ${repBadge}
                </button>
                `;
            }
            
            html += `</div>
            <div class="mt-4 p-3 rounded-xl bg-fifa-cyan/10 border border-fifa-cyan/20 flex items-start gap-3">
                <i class="fa-solid fa-circle-info text-fifa-cyan mt-0.5"></i>
                <p class="text-[11px] text-gray-300 leading-tight">
                    <strong class="text-white">Tap simple</strong> para marcar obtenida.<br>
                    <strong class="text-white">Mantén presionado</strong> (o click derecho) para agregar repetida.<br>
                    <strong class="text-white">Tap en repetida</strong> para restarla.
                </p>
            </div>`;
            
            return html;
        }

        function toggleTeam(code) {
            const grid = document.getElementById(`grid-${code}`);
            const icon = document.getElementById(`icon-${code}`);
            
            if (grid.classList.contains('hidden')) {
                // Renderizar contenido si está vacío
                if(grid.innerHTML.trim() === '') {
                    grid.innerHTML = renderStickersGrid(code);
                }
                grid.classList.remove('hidden');
                icon.style.transform = 'rotate(180deg)';
                icon.classList.replace('text-gray-400', 'text-white');
            } else {
                grid.classList.add('hidden');
                icon.style.transform = 'rotate(0deg)';
                icon.classList.replace('text-white', 'text-gray-400');
            }
        }

        // --- 5. INTERACCIÓN DEL USUARIO ---
        function toggleSticker(id) {
            if (!collection[id]) collection[id] = { got: false, rep: 0 };
            
            collection[id].got = !collection[id].got;
            // Si la desmarco como obtenida, lógicamente ya no puedo tener repetidas de esta
            if (!collection[id].got) collection[id].rep = 0;

            saveSticker(id, collection[id]);
            
            const teamCode = id.split('-')[0];
            updateSingleStickerButton(id);
            updateTeamHeader(teamCode);
            updateStats();
            
            // Haptic feedback
            if (navigator.vibrate) {
                navigator.vibrate(collection[id].got ? [30] : [20, 20]);
            }
        }

        function changeRep(id, delta) {
            if (!collection[id]) collection[id] = { got: true, rep: 0 };
            
            // Si agrego repetida y no la tenía marcada como obtenida, la marco obtenida
            if (!collection[id].got && delta > 0) {
                collection[id].got = true; 
            }
            
            collection[id].rep = Math.max(0, (collection[id].rep || 0) + delta);
            saveSticker(id, collection[id]);
            
            updateSingleStickerButton(id);
            updateTeamHeader(id.split('-')[0]);
            updateStats();
            
            if (navigator.vibrate) navigator.vibrate(40);
        }

        // Actualización eficiente (solo el botón afectado, no todo el grid)
        function updateSingleStickerButton(id) {
            const btn = document.getElementById(`btn-${id}`);
            if(!btn) return; // Si el grid no está abierto, no hace falta actualizar el DOM
            
            const teamCode = id.split('-')[0];
            const isFWC = teamCode === 'FWC';
            const num = id.split('-')[1];
            const st = collection[id];
            
            // Limpiar clases previas
            btn.className = `relative aspect-[3/4] rounded-lg font-bold text-sm flex flex-col items-center justify-center sticker-btn`;
            
            if(st.got) {
                btn.classList.add(isFWC ? 'fwc-card' : 'sticker-got');
                if(!isFWC) btn.classList.add('sticker-got');
            } else {
                btn.classList.add('sticker-missing');
            }
            
            const repBadge = st.rep > 0 ? `<div class="sticker-rep" onclick="event.stopPropagation(); changeRep('${id}', -1)">${st.rep}</div>` : '';
            
            btn.innerHTML = `
                <span class="opacity-60 text-[9px] mb-1 leading-none tracking-wider">${teamCode}</span>
                <span class="text-base">${num}</span>
                ${repBadge}
            `;
        }

        function updateTeamHeader(code) {
            const team = TEAMS.find(t => t.code === code);
            let got = 0;
            for(let i=1; i<=team.count; i++) {
                if(collection[`${code}-${i}`] && collection[`${code}-${i}`].got) got++;
            }
            
            const card = document.getElementById(`card-${code}`);
            const counter = document.getElementById(`counter-${code}`);
            const badge = document.getElementById(`badge-${code}`);
            const desc = document.getElementById(`desc-${code}`);
            
            counter.innerText = `${got}/${team.count}`;
            
            const isComplete = got === team.count;
            const isEmpty = got === 0;
            
            card.dataset.status = isComplete ? 'complete' : (isEmpty ? 'empty' : 'incomplete');
            
            if(isComplete) {
                counter.className = "text-sm font-black text-fifa-green transition-colors duration-300";
                badge.className = "w-10 h-10 rounded-full bg-fifa-green text-[#0a0514] flex items-center justify-center font-black text-xs shadow-inner transition-colors duration-300";
                card.classList.add('border-fifa-green/40', 'shadow-[0_0_15px_rgba(16,185,129,0.1)]');
                card.classList.remove('border-white/5');
                desc.innerText = "¡Completado!";
                desc.className = "text-xs text-fifa-green font-bold";
            } else {
                counter.className = "text-sm font-black text-gray-400 transition-colors duration-300";
                badge.className = "w-10 h-10 rounded-full bg-white/10 text-white border border-white/20 flex items-center justify-center font-black text-xs shadow-inner transition-colors duration-300";
                card.classList.remove('border-fifa-green/40', 'shadow-[0_0_15px_rgba(16,185,129,0.1)]');
                card.classList.add('border-white/5');
                desc.innerText = isEmpty ? "Sin iniciar" : "En progreso";
                desc.className = "text-xs text-gray-500 font-medium";
            }
            
            // Reaplicar filtro si estamos en una vista filtrada
            if(currentFilter !== 'all') applyFilter();
        }

        // --- 6. ESTADÍSTICAS Y LISTAS ---
        // Corrección Lógica Crítica: Las FWC ahora se suman correctamente al total
        function updateStats() {
            let got = 0, reps = 0, total = 980; // 960 base + 20 FWC
            let missingList = [], repsList = [];

            TEAMS.forEach(team => {
                let teamMissing = [];
                let teamReps = [];
                
                for(let i=1; i<=team.count; i++) {
                    const id = `${team.code}-${i}`;
                    const st = collection[id];
                    const displayId = `${team.code} ${i}`;

                    if(st && st.got) {
                        got++;
                        if(st.rep > 0) {
                            reps += st.rep;
                            teamReps.push(`${displayId} (x${st.rep})`);
                        }
                    } else {
                        teamMissing.push(displayId);
                    }
                }

                // Generar bloques de texto limpios para WhatsApp/Portapapeles
                if(teamMissing.length > 0) {
                    missingList.push(`⚽ *${team.name}*
${teamMissing.join(', ')}`);
                }
                if(teamReps.length > 0) {
                    repsList.push(`🔄 *${team.name}*
${teamReps.join(', ')}`);
                }
            });

            // Actualizar UI
            const perc = total > 0 ? ((got / total) * 100).toFixed(1) : 0;
            
            // Animación de contadores simple
            document.getElementById('stat-got').innerText = got;
            document.getElementById('stat-missing').innerText = total - got;
            document.getElementById('stat-repeats').innerText = reps;
            
            // Barra superior
            document.getElementById('global-perc').innerText = `${Math.floor(perc)}%`;
            document.getElementById('global-progress').style.width = `${perc}%`;

            // Badge nav repetidas
            const badge = document.getElementById('badge-repeats');
            if(reps > 0) {
                badge.innerText = reps > 99 ? '99+' : reps;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }

            // Listas de texto
            const headerText = `🏆 *MI ÁLBUM STICKER GOL 2026*
📊 Progreso: ${perc}%

`;
            
            document.getElementById('missing-list').innerText = missingList.length > 0 
                ? headerText + `❌ *ME FALTAN (${total - got}):*

` + missingList.join('

') 
                : '¡Felicidades! Tienes el álbum completamente lleno. 🎉🏆';
                
            document.getElementById('repeats-list').innerText = repsList.length > 0 
                ? headerText + `✅ *TENGO REPETIDAS (${reps}):*

` + repsList.join('

') 
                : 'No tienes láminas repetidas registradas aún.';
        }

        // --- 7. FILTROS Y NAVEGACIÓN ---
        function filterTeams(status) {
            currentFilter = status;
            
            // UI de botones
            const btnAll = document.getElementById('btn-filt-all');
            const btnInc = document.getElementById('btn-filt-inc');
            const btnCom = document.getElementById('btn-filt-com');
            
            // Reset styles
            [btnAll, btnInc, btnCom].forEach(b => {
                b.className = "px-5 py-2 rounded-full bg-white/5 text-gray-300 text-sm font-medium whitespace-nowrap border border-white/10 hover:bg-white/10 transition";
            });
            
            // Apply active style
            const activeBtn = status === 'all' ? btnAll : (status === 'incomplete' ? btnInc : btnCom);
            activeBtn.className = "px-5 py-2 rounded-full bg-gradient-2026 text-white text-sm font-bold whitespace-nowrap shadow-lg shadow-purple-500/20 transition";

            applyFilter();
        }

        function applyFilter() {
            document.querySelectorAll('.team-card').forEach(card => {
                if (currentFilter === 'all') {
                    card.style.display = 'block';
                } else if (currentFilter === 'complete' && card.dataset.status === 'complete') {
                    card.style.display = 'block';
                } else if (currentFilter === 'incomplete' && card.dataset.status !== 'complete') {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        function switchTab(tabId) {
            // Scroll to top automatically
            window.scrollTo({top: 0, behavior: 'smooth'});
            
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            
            // Reset Nav Buttons
            const navBtnClass = "nav-btn flex flex-col items-center justify-center w-16 h-full text-gray-500 hover:text-white transition";
            const navIds = ['nav-album', 'nav-missing', 'nav-repeats', 'nav-stats'];
            
            navIds.forEach(id => {
                const btn = document.getElementById(id);
                // Keep the relative class for repeats badge
                if(id === 'nav-repeats') {
                    btn.className = navBtnClass + " relative";
                } else {
                    btn.className = navBtnClass;
                }
            });
            
            // Active Nav Button
            const activeBtn = document.getElementById(`nav-${tabId}`);
            activeBtn.classList.add('active');
            // Remove text-gray-500 from active
            activeBtn.classList.remove('text-gray-500');
        }

        // --- 8. UTILIDADES Y EXPORTACIÓN ---
        function copyToClipboard(elementId, btnElement) {
            const text = document.getElementById(elementId).innerText;
            navigator.clipboard.writeText(text).then(() => {
                const originalHTML = btnElement.innerHTML;
                btnElement.innerHTML = `<i class="fa-solid fa-check text-fifa-green"></i> <span class="text-fifa-green">¡Lista Copiada!</span>`;
                btnElement.classList.replace('border-white/10', 'border-fifa-green/50');
                
                setTimeout(() => {
                    btnElement.innerHTML = originalHTML;
                    btnElement.classList.replace('border-fifa-green/50', 'border-white/10');
                }, 2000);
            }).catch(err => {
                showModal("Error", "No se pudo copiar al portapapeles. Da permisos o selecciona manualmente.", "error");
            });
        }

        function exportData() {
            const dataStr = JSON.stringify(collection);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const date = new Date().toISOString().split('T')[0];
            const a = document.createElement('a');
            a.href = url;
            a.download = `StickerGol2026_Respaldo_${date}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showModal("Exportación Exitosa", "Tu archivo de respaldo se ha descargado. Guárdalo en un lugar seguro.", "success");
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if(typeof importedData !== 'object' || Array.isArray(importedData)) {
                        throw new Error("El formato del archivo no es válido.");
                    }
                    
                    showModal(
                        "Confirmar Importación", 
                        "¿Estás seguro de sobrescribir tu colección actual? Esta acción no se puede deshacer.",
                        "warning",
                        [
                            { text: "Cancelar", type: "secondary", action: closeModal },
                            { text: "Sí, Sobrescribir", type: "primary", action: () => executeImport(importedData) }
                        ]
                    );
                } catch(err) {
                    showModal("Archivo Inválido", "El archivo seleccionado no es un respaldo válido de Sticker Gol.", "error");
                }
            };
            reader.readAsText(file);
            event.target.value = ''; // Reset input
        }

        async function executeImport(data) {
            closeModal();
            try {
                document.getElementById('splash').style.display = 'flex';
                document.getElementById('splash').style.opacity = '1';
                document.getElementById('splash').style.visibility = 'visible';
                document.getElementById('splash-text').innerText = "Restaurando base de datos...";
                
                await clearAllStickersDB();
                collection = {};
                
                // Batch save to avoid hanging UI
                const entries = Object.entries(data);
                for (let i = 0; i < entries.length; i++) {
                    const [key, value] = entries[i];
                    collection[key] = value;
                    saveSticker(key, value);
                }
                
                renderAlbum();
                updateStats();
                
                setTimeout(() => {
                    document.getElementById('splash').style.opacity = '0';
                    setTimeout(() => document.getElementById('splash').style.display = 'none', 500);
                    showModal("Restauración Exitosa", "Tu colección se ha recuperado correctamente.", "success");
                }, 1000);
                
            } catch(e) {
                document.getElementById('splash').style.display = 'none';
                showModal("Error Fatal", "Hubo un problema restaurando los datos.", "error");
            }
        }

        function confirmClearData() {
            showModal(
                "⚠️ PELIGRO EXTREMO", 
                "¿Estás absolutamente seguro de borrar TODA tu colección? Perderás todo el progreso y no se podrá recuperar.",
                "danger",
                [
                    { text: "Cancelar", type: "secondary", action: closeModal },
                    { text: "BORRAR TODO", type: "danger", action: executeClearData }
                ]
            );
        }

        async function executeClearData() {
            closeModal();
            await clearAllStickersDB();
            localStorage.clear();
            collection = {};
            renderAlbum();
            updateStats();
            showModal("Álbum Reiniciado", "Tu colección está en cero. ¡Buena suerte empezando de nuevo!", "info");
        }

        // --- 9. SISTEMA DE MODALES CUSTOM ---
        function showModal(title, message, type = 'info', buttons = null) {
            const modal = document.getElementById('custom-modal');
            const content = document.getElementById('modal-content');
            const titleEl = document.getElementById('modal-title');
            const bodyEl = document.getElementById('modal-body');
            const iconEl = document.getElementById('modal-icon');
            const actionsEl = document.getElementById('modal-actions');
            
            titleEl.innerText = title;
            bodyEl.innerText = message;
            
            // Configurar Icono
            let iconHtml = '';
            if(type === 'success') iconHtml = '<i class="fa-solid fa-circle-check text-5xl text-fifa-green"></i>';
            else if(type === 'error') iconHtml = '<i class="fa-solid fa-circle-xmark text-5xl text-red-500"></i>';
            else if(type === 'warning' || type === 'danger') iconHtml = '<i class="fa-solid fa-triangle-exclamation text-5xl text-yellow-500"></i>';
            else iconHtml = '<i class="fa-solid fa-circle-info text-5xl text-fifa-cyan"></i>';
            
            iconEl.innerHTML = iconHtml;
            
            // Configurar Botones
            actionsEl.innerHTML = '';
            if(!buttons) {
                // Default Ok button
                buttons = [{ text: "Entendido", type: "primary", action: closeModal }];
            }
            
            buttons.forEach(btn => {
                const btnEl = document.createElement('button');
                let bgClass = '';
                
                if(btn.type === 'primary') bgClass = 'bg-gradient-2026 text-white border-transparent';
                else if(btn.type === 'danger') bgClass = 'bg-red-500 text-white border-transparent hover:bg-red-600';
                else bgClass = 'bg-transparent text-gray-300 border-white/20 hover:bg-white/5';
                
                btnEl.className = `flex-1 py-2.5 rounded-xl border font-bold text-sm transition-colors ${bgClass}`;
                btnEl.innerText = btn.text;
                btnEl.onclick = btn.action;
                actionsEl.appendChild(btnEl);
            });
            
            modal.classList.remove('hidden');
            // Trigger animation
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('custom-modal');
            const content = document.getElementById('modal-content');
            
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 200);
        }

        // PWA Support (Evitar menú de contexto nativo en móviles)
        document.addEventListener('contextmenu', event => {
            if (event.target.closest('.sticker-btn')) {
                event.preventDefault();
            }
        });

        // Initialize App
        window.onload = boot;
    </script>
</body>
</html>
